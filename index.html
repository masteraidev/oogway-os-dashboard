<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOGWAY OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
</head>
<body>
    <div id="os-container">
        <div id="three-container"></div>
        <div id="ui-layer">
            <header id="header">
                <h1>OOGWAY OS</h1>
                <div id="metrics">
                    <div class="metric"><span class="label">Tasks</span><span id="task-counter">0</span></div>
                    <div class="metric"><span class="label">Revenue</span><span id="revenue-tracker">R0</span></div>
                    <div class="metric"><span class="label">Uptime</span><span id="uptime-clock">00:00:00</span></div>
                    <div class="metric"><span class="label">Agents Live</span><span id="agents-live">0</span></div>
                </div>
            </header>
            <main id="main">
                <section id="agent-panel">
                    <h2>Agent Control</h2>
                    <div id="agent-list"></div>
                    <div id="agent-drawer" class="drawer">
                        <div class="drawer-header">
                            <span id="drawer-title">Agent Name</span>
                            <button id="close-drawer">×</button>
                        </div>
                        <div id="drawer-content" class="activity-log"></div>
                    </div>
                </section>
                <section id="feed-panel">
                    <h2>Live Feed</h2>
                    <div id="feed-container"></div>
                </section>
                <section id="deploy-panel">
                    <h2>Quick Deploy</h2>
                    <div id="deploy-buttons"></div>
                </section>
                
                <!-- Chat Widget Section -->
                <section id="chat-section">
                    <h2>Chat Assistant <span id="voice-status" class="voice-off">🔇</span></h2>
                    <div id="chat-widget">
                        <div id="chat-messages"></div>
                        <div id="chat-input-container">
                            <input type="text" id="chat-input" placeholder="Type here or click 🎤 to speak...">
                            <button id="chat-send">Send</button>
                            <button id="voice-toggle" title="Enable voice output">🔊</button>
                            <button id="mic-toggle" title="Enable voice input">🎤</button>
                        </div>
                    </div>
                </section>
                
                <!-- Market Data Section -->
                <section id="market-section">
                    <h2>Market Data</h2>
                    <div class="market-grid">
                        <div class="market-card">
                            <div class="market-symbol">BTC/USD</div>
                            <div class="market-price" id="btc-price">--</div>
                            <div class="market-change" id="btc-change">--</div>
                        </div>
                        <div class="market-card">
                            <div class="market-symbol">ETH/USD</div>
                            <div class="market-price" id="eth-price">--</div>
                            <div class="market-change" id="eth-change">--</div>
                        </div>
                        <div class="market-card">
                            <div class="market-symbol">AAPL</div>
                            <div class="market-price" id="aapl-price">--</div>
                            <div class="market-change" id="aapl-change">--</div>
                        </div>
                        <div class="market-card">
                            <div class="market-symbol">TSLA</div>
                            <div class="market-price" id="tsla-price">--</div>
                            <div class="market-change" id="tsla-change">--</div>
                        </div>
                    </div>
                    <div class="market-chart-container">
                        <canvas id="marketChart" width="400" height="150"></canvas>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="main.js"></script>
    
    <!-- Chat Widget & Metrics Script -->
    <script>
        // ElevenLabs API Configuration
        const ELEVENLABS_API_KEY = 'sk_396d212d4dc231136724851b0ee5dec62ec56a87a61f8dc9';
        const ELEVENLABS_VOICE_ID = '21m00Tcm4obsnIq57xKk'; // Natasha (Sensual, Hypnotic)
        
        // Chat Widget Implementation
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const voiceToggle = document.getElementById('voice-toggle');
        const micToggle = document.getElementById('mic-toggle');
        const voiceStatus = document.getElementById('voice-status');
        let messages = [];
        let voiceOutputEnabled = false;
        let voiceInputEnabled = false;
        
        // Web Speech API Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                chatInput.value = transcript;
                
                if (event.results[0].isFinal) {
                    setTimeout(() => sendMessage(), 500);
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    addMessage("❌ Microphone access denied. Please allow microphone in browser settings.", false);
                    voiceInputEnabled = false;
                    micToggle.classList.remove('active');
                    micToggle.style.background = 'linear-gradient(135deg, #666, #444)';
                } else if (event.error === 'no-speech') {
                    addMessage("⚠️ No speech detected. Try speaking louder.", false);
                } else if (event.error === 'audio-capture') {
                    addMessage("❌ No microphone found. Please connect a microphone.", false);
                } else if (event.error === 'network') {
                    addMessage("🌐 Network error. Speech recognition requires internet connection.", false);
                }
            };
            
            recognition.onend = () => {
                if (voiceInputEnabled) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log('Recognition restart error:', e);
                    }
                }
            };
            
            recognition.onstart = () => {
                addMessage("🎤 Microphone active. Speak now...", false);
            };
        }
        
        function addMessage(text, isUser = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser ? 'message user' : 'message bot';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            messages.push({ text, isUser, time: new Date() });
        }
        
        function sendMessage() {
            const text = chatInput.value.trim();
            if (text) {
                addMessage(text, true);
                chatInput.value = '';
                setTimeout(() => {
                    addMessage("I'm Master Oogway. How can I assist you today?", false);
                }, 500);
            }
        }
        
        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Voice Output Toggle (ElevenLabs TTS)
        voiceToggle.addEventListener('click', () => {
            voiceOutputEnabled = !voiceOutputEnabled;
            voiceToggle.textContent = voiceOutputEnabled ? '🔊' : '🔇';
            voiceStatus.textContent = voiceOutputEnabled ? '🔊' : '🔇';
            voiceStatus.className = voiceOutputEnabled ? 'voice-on' : 'voice-off';
            addMessage(`Voice output ${voiceOutputEnabled ? 'enabled' : 'disabled'}`, false);
            
            if (voiceOutputEnabled) {
                speakText("Voice output enabled. I am Master Oogway, ready to assist you.");
            }
        });
        
        // Microphone Input Toggle (Web Speech API)
        micToggle.addEventListener('click', () => {
            if (!recognition) {
                addMessage("❌ Speech recognition not supported in this browser.", false);
                addMessage("✅ Try using Chrome or Edge browser.", false);
                return;
            }
            
            voiceInputEnabled = !voiceInputEnabled;
            micToggle.classList.toggle('active', voiceInputEnabled);
            micToggle.style.background = voiceInputEnabled ? 
                'linear-gradient(135deg, #00ff00, #00cc00)' : 
                'linear-gradient(135deg, #666, #444)';
            
            if (voiceInputEnabled) {
                try {
                    recognition.start();
                    addMessage("🎤 Microphone enabled. Speak now...", false);
                    addMessage("Try saying: 'What's the market?'", false);
                } catch (e) {
                    addMessage("❌ Error: " + e.message, false);
                    voiceInputEnabled = false;
                    micToggle.classList.remove('active');
                    micToggle.style.background = 'linear-gradient(135deg, #666, #444)';
                }
            } else {
                try {
                    recognition.stop();
                    addMessage("🎤 Microphone disabled.", false);
                } catch (e) {
                    console.log('Stop error:', e);
                }
            }
        });
        
        // ElevenLabs Text-to-Speech
        async function speakText(text) {
            if (!voiceOutputEnabled) return;
            
            try {
                const response = await fetch(
                    `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}/stream`,
                    {
                        method: 'POST',
                        headers: {
                            'xi-api-key': ELEVENLABS_API_KEY,
                            'Content-Type': 'application/json',
                            'Accept': 'audio/mpeg'
                        },
                        body: JSON.stringify({
                            text: text,
                            model_id: 'eleven_multilingual_v2',
                            voice_settings: {
                                stability: 0.3,
                                similarity_boost: 0.8
                            }
                        })
                    }
                );
                
                if (!response.ok) throw new Error('API request failed');
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
                
            } catch (error) {
                console.error('Voice synthesis failed:', error);
            }
        }
        
        // Enhanced sendMessage with voice
        const originalSendMessage = sendMessage;
        sendMessage = function() {
            const text = chatInput.value.trim();
            if (text) {
                addMessage(text, true);
                chatInput.value = '';
                
                // Process message and respond
                setTimeout(() => {
                    let response = "";
                    const lowerText = text.toLowerCase();
                    
                    // Command processing
                    if (lowerText.includes("market") || lowerText.includes("price") || lowerText.includes("stocks") || lowerText.includes("btc") || lowerText.includes("crypto")) {
                        response = "The market section shows live prices for BTC, ETH, AAPL, and TSLA. They update every 2 seconds.";
                    } else if (lowerText.includes("help") || lowerText.includes("commands") || lowerText.includes("what can you do")) {
                        response = "I'm Master Oogway. You can ask: 'What's the market?' 'Help me' 'Hello' or use voice commands.";
                    } else if (lowerText.includes("hello") || lowerText.includes("hi") || lowerText.includes("hey") || lowerText.includes("greetings")) {
                        response = "Greetings! I'm Master Oogway, your autonomous assistant. How may I assist you today?";
                    } else if (lowerText.includes("record") || lowerText.includes("mic") || lowerText.includes("voice") || lowerText.includes("speak") || lowerText.includes("talk")) {
                        response = "Click the 🎤 microphone button to enable voice input, then speak your message. Click 🔊 to hear my response.";
                    } else if (lowerText.includes("tenacit") || lowerText.includes("mission control") || lowerText.includes("tenacitos")) {
                        response = "TenacitOS Mission Control is live at mission-control-chi-liart.vercel.app. Password is 'oogway'.";
                    } else if (lowerText.includes("dashboard") || lowerText.includes("oogway") || lowerText.includes("home")) {
                        response = "OOGWAY OS Dashboard is live at oogway-os-host.vercel.app with voice features and market data.";
                    } else if (lowerText.includes("thank")) {
                        response = "You're welcome! I'm Master Oogway, always ready to assist you.";
                    } else {
                        response = "I'm Master Oogway. How can I assist you today?";
                    }
                    
                    addMessage(response, false);
                    
                    if (voiceOutputEnabled && response) {
                        speakText(response);
                    }
                }, 500);
            }
        };
        
        addMessage("=== OOGWAY OS DASHBOARD ===", false);
        addMessage("I'm Master Oogway, your autonomous assistant.", false);
        addMessage("", false);
        addMessage("TO ENABLE VOICE:", false);
        addMessage("1. Click the 🎤 button (turns green)", false);
        addMessage("2. Allow microphone access when prompted", false);
        addMessage("3. Speak your message clearly", false);
        addMessage("4. Click 🔊 to hear my response", false);
        addMessage("", false);
        addMessage("TRY SAYING:", false);
        addMessage("- 'What's the market looking like?'", false);
        addMessage("- 'Help me with the dashboard'", false);
        addMessage("- 'Hello Master Oogway'", false);
        speakText("Welcome to OOGWAY OS Dashboard. I am Master Oogway. To enable voice, click the microphone button, allow access, and speak to me. Try saying: What's the market looking like?");
        
        // Real-time metrics updates
        let taskCount = 0, revenue = 0;
        setInterval(() => {
            taskCount += Math.floor(Math.random() * 3);
            document.getElementById('task-counter').textContent = taskCount;
            revenue += Math.floor(Math.random() * 100);
            document.getElementById('revenue-tracker').textContent = 'R' + revenue.toLocaleString();
            document.getElementById('agents-live').textContent = Math.floor(Math.random() * 10) + 1;
        }, 2000);
        
        let uptimeSeconds = 0;
        setInterval(() => {
            uptimeSeconds++;
            const hours = Math.floor(uptimeSeconds / 3600).toString().padStart(2, '0');
            const minutes = Math.floor((uptimeSeconds % 3600) / 60).toString().padStart(2, '0');
            const seconds = (uptimeSeconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }, 1000);
        
        // Market Data Simulation (Real API integration would require backend)
        const marketPrices = {
            'BTC': { price: 67500, change: 2.5 },
            'ETH': { price: 3450, change: 1.8 },
            'AAPL': { price: 178.50, change: -0.5 },
            'TSLA': { price: 245.30, change: 1.2 }
        };
        
        function updateMarketData() {
            // Simulate real-time price updates
            Object.keys(marketPrices).forEach(symbol => {
                const data = marketPrices[symbol];
                const volatility = Math.random() * 0.5 - 0.25;
                data.price = data.price * (1 + volatility / 100);
                data.change = (Math.random() * 4 - 2).toFixed(2);
            });
            
            document.getElementById('btc-price').textContent = '$' + marketPrices.BTC.price.toFixed(2);
            document.getElementById('btc-change').textContent = marketPrices.BTC.change + '%';
            document.getElementById('btc-change').style.color = marketPrices.BTC.change >= 0 ? '#00ff00' : '#ff0000';
            
            document.getElementById('eth-price').textContent = '$' + marketPrices.ETH.price.toFixed(2);
            document.getElementById('eth-change').textContent = marketPrices.ETH.change + '%';
            document.getElementById('eth-change').style.color = marketPrices.ETH.change >= 0 ? '#00ff00' : '#ff0000';
            
            document.getElementById('aapl-price').textContent = '$' + marketPrices.AAPL.price.toFixed(2);
            document.getElementById('aapl-change').textContent = marketPrices.AAPL.change + '%';
            document.getElementById('aapl-change').style.color = marketPrices.AAPL.change >= 0 ? '#00ff00' : '#ff0000';
            
            document.getElementById('tsla-price').textContent = '$' + marketPrices.TSLA.price.toFixed(2);
            document.getElementById('tsla-change').textContent = marketPrices.TSLA.change + '%';
            document.getElementById('tsla-change').style.color = marketPrices.TSLA.change >= 0 ? '#00ff00' : '#ff0000';
        }
        
        // Update market data every 2 seconds
        setInterval(updateMarketData, 2000);
        updateMarketData();
        
        // Market Chart
        const ctx = document.getElementById('marketChart').getContext('2d');
        const marketChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 20}, (_, i) => i),
                datasets: [{
                    label: 'BTC/USD',
                    data: Array.from({length: 20}, () => 67000 + Math.random() * 1000),
                    borderColor: '#f7931a',
                    backgroundColor: 'rgba(247, 147, 26, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        display: true,
                        ticks: { color: '#888' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                }
            }
        });
        
        // Update chart data
        setInterval(() => {
            marketChart.data.datasets[0].data.shift();
            marketChart.data.datasets[0].data.push(67000 + Math.random() * 1000);
            marketChart.update('none');
        }, 1000);
    </script>
</body>
</html>
